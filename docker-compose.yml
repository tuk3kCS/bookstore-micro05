services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    environment:
      DB_NAME: customer_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    environment:
      DB_NAME: book_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    environment:
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  staff-service:
    build: ./staff-service
    ports:
      - "8004:8000"
    environment:
      DB_NAME: staff_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  manager-service:
    build: ./manager-service
    ports:
      - "8005:8000"
    environment:
      DB_NAME: manager_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  catalog-service:
    build: ./catalog-service
    ports:
      - "8006:8000"
    environment:
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8007:8000"
    environment:
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  ship-service:
    build: ./ship-service
    ports:
      - "8008:8000"
    environment:
      DB_NAME: ship_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  pay-service:
    build: ./pay-service
    ports:
      - "8009:8000"
    environment:
      DB_NAME: pay_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    environment:
      DB_NAME: comment_rate_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    environment:
      DB_NAME: recommender_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  clothes-service:
    build: ./clothes-service
    ports:
      - "8012:8000"
    environment:
      DB_NAME: clothes_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  behavior-analytics-service:
    build: ./behavior-analytics-service
    ports:
      - "8013:8000"
    environment:
      DB_NAME: behavior_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      MODEL_DIR: /models
    volumes:
      - behavior_models:/models
    depends_on:
      db:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  kb-rag-service:
    build: ./kb-rag-service
    ports:
      - "8014:8000"
    environment:
      DB_NAME: kb_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: kb_chunks
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      EMBEDDING_MODEL: text-embedding-3-small
      KB_SOURCE_DIR: /kb
    volumes:
      - ./docs/kb:/kb:ro
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started

  chat-advisor-service:
    build: ./chat-advisor-service
    ports:
      - "8015:8000"
    environment:
      BEHAVIOR_SERVICE_URL: http://behavior-analytics-service:8000
      KB_RAG_SERVICE_URL: http://kb-rag-service:8000
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      CHAT_MODEL: gpt-4.1-mini
    depends_on:
      - behavior-analytics-service
      - kb-rag-service

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - customer-service
      - book-service
      - cart-service
      - staff-service
      - order-service
      - ship-service
      - pay-service
      - comment-rate-service
      - recommender-ai-service
      - clothes-service
      - behavior-analytics-service
      - kb-rag-service
      - chat-advisor-service

volumes:
  postgres_data:
  qdrant_data:
  behavior_models:
