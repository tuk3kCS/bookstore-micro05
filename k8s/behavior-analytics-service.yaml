apiVersion: apps/v1
kind: Deployment
metadata:
  name: behavior-analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: behavior-analytics-service
  template:
    metadata:
      labels:
        app: behavior-analytics-service
    spec:
      containers:
        - name: behavior-analytics-service
          image: behavior-analytics-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DB_NAME
              value: behavior_db
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_HOST
              value: db
            - name: DB_PORT
              value: "5432"
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: behavior-analytics-service
spec:
  selector:
    app: behavior-analytics-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000

